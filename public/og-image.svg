<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6fc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f25022"/>
      <stop offset="33%" stop-color="#ffb900"/>
      <stop offset="66%" stop-color="#7fba00"/>
      <stop offset="100%" stop-color="#00a4ef"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Four-square decorative accent (NOT a Microsoft logo) -->
  <g transform="translate(80, 80)">
    <rect width="44" height="44" fill="#f25022"/>
    <rect x="52" width="44" height="44" fill="#7fba00"/>
    <rect y="52" width="44" height="44" fill="#00a4ef"/>
    <rect x="52" y="52" width="44" height="44" fill="#ffb900"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#0078d4">M365 Profiles</text>
  <text x="180" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#605e5c">Microsoft 365 Licensing Decision Tree · Unofficial</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#0a1628">The right Microsoft 365</text>
  <text x="80" y="400" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#0a1628">license for every profile.</text>

  <!-- Subline -->
  <text x="80" y="470" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" fill="#424242">Step-by-step · Source-cited · PDF handout · No tracking</text>

  <!-- Bottom four-color rule -->
  <rect x="0" y="612" width="1200" height="18" fill="url(#ruleGrad)"/>
</svg>
