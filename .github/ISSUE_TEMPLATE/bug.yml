name: 🐞 Bug report
description: A page is broken, the assessment behaves wrong, or something doesn't render.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **licensing-accuracy** disputes please use the
        "Content / accuracy" template instead — those are not bugs.
  - type: input
    id: page
    attributes:
      label: Page / URL
      description: Which page or URL exhibits the bug?
      placeholder: https://billmcilhargey.github.io/m365-profiles/assessment
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '/assessment'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Build version
      description: From the site footer (e.g. `v2025.11.21-42`).
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "e.g. Edge 130 on Windows 11"
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console / network errors
      description: Paste any DevTools console errors (DevTools → Console).
      render: text
    validations:
      required: false
